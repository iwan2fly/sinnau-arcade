<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sinnau Arcade Login</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2 style="color: #333; text-align: center;">🎮 신나유 오락실 접속 인증</h2>
        <p style="font-size: 16px; color: #666; line-height: 1.6;">
            안녕하세요! 신나유 오락실에 접속해 주셔서 감사합니다.<br>
            아래의 인증번호를 입력하여 로그인을 완료해 주세요.
        </p>
        <div style="margin: 30px 0; text-align: center;">
            <span style="display: inline-block; padding: 10px 20px; font-size: 24px; font-weight: bold; color: #ffffff; background-color: #007bff; border-radius: 5px;">
                {{code}}
            </span>
        </div>
        <p style="font-size: 14px; color: #999; text-align: center;">
            인증번호는 5분 동안 유효합니다.<br>
            본인이 요청하지 않은 경우 이 메일을 무시해 주세요.
        </p>
    </div>
</body>
</html>
